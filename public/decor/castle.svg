  />

  <!-- grate lines -->
  <line x1="22" y1="62" x2="42" y2="62" stroke="#1A1A1A" stroke-width="1"/>
  <line x1="22" y1="66" x2="42" y2="66" stroke="#1A1A1A" stroke-width="1"/>
  <line x1="22" y1="70" x2="42" y2="70" stroke="#1A1A1A" stroke-width="1"/>
