<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 88" fill="none" aria-hidden="true">
  <!-- pediment -->
  <path
    d="M4 22 L32 4 L60 22 Z"
    fill="#2D5C4A"
    stroke="#1A1A1A"
    stroke-width="1.25"
    stroke-linejoin="round"
  />

  <!-- column entablature -->
  <rect
    x="8"
    y="22"
    width="48"
    height="18"
    fill="#F5F0E6"
    stroke="#1A1A1A"
    stroke-width="1.25"
  />
  <line x1="17" y1="22" x2="17" y2="40" stroke="#1A1A1A" stroke-width="1.25"/>
  <line x1="25.5" y1="22" x2="25.5" y2="40" stroke="#1A1A1A" stroke-width="1.25"/>
  <line x1="38.5" y1="22" x2="38.5" y2="40" stroke="#1A1A1A" stroke-width="1.25"/>
  <line x1="47" y1="22" x2="47" y2="40" stroke="#1A1A1A" stroke-width="1.25"/>

  <!-- stone band -->
  <rect
    x="6"
    y="40"
